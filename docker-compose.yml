services:
  backend:
    build:
      context: ./backend
      args:
        INSTALL_CHROMA: ${INSTALL_CHROMA:-false}
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      VECTOR_STORE: ${VECTOR_STORE:-local}
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
