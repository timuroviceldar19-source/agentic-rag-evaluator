services:
  backend:
    build:
      context: ./backend
      args:
        INSTALL_CHROMA: ${INSTALL_CHROMA:-false}
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      VECTOR_STORE: ${VECTOR_STORE:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag:rag@postgres:5432/rag_history}
    volumes:
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rag_history
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_history"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
